name: Firewatch
options:
  bundleIdPrefix: com.firewatch
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top

targets:
  Firewatch:
    type: application
    platform: macOS
    sources:
      - Firewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.firewatch.Firewatch
        MARKETING_VERSION: "1.5.1"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: Firewatch/Resources/Firewatch.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Firewatch
    dependencies:
      - sdk: libsqlite3.tbd
